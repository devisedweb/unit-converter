<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unit Convertor</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <h1>Metric/Imperial Unit Conversion</h1>
      <input type="text" placeholder="0" id="input" />
      <button id="convert-btn">Convert</button>
    </header>

    <h3>Length (Meter/Feet)</h3>
    <p id="length-el">0 meters = 0.000 feet | 0 feet = 0.000 meters</p>
    <h3>Volume (Liters/Gallons)</h3>
    <p id="volume-el">0 liters = 0.000 gallons | 0 gallons = 0.000 liters</p>
    <h3>Mass (Kilograms/Pounds)</h3>
    <p id="mass-el">0 kilograms = 0.000 pound | 0 pounds = 0.000 kilograms</p>

    <script src="./index.js"></script>
  </body>
</html>
